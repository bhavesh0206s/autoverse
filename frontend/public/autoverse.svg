<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="deepVoidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0814"/>
      <stop offset="50%" stop-color="#08050D"/>
      <stop offset="100%" stop-color="#040208"/>
    </linearGradient>

    <linearGradient id="ringGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="50%" stop-color="#F43F5E"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>

    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>

    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="128" fill="url(#deepVoidGrad)"/>

  <ellipse cx="256" cy="275" rx="200" ry="80" 
           transform="rotate(-15 256 275)" 
           fill="none" 
           stroke="url(#ringGrad)" 
           stroke-width="16" 
           stroke-linecap="round" 
           stroke-dasharray="220 50 140 50" 
           filter="url(#glow)"/>

  <path d="M 120 390 L 256 100 L 392 390" 
        fill="none" 
        stroke="url(#frameGrad)" 
        stroke-width="56" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>

  <circle cx="256" cy="100" r="16" fill="#0D0814"/>
  <circle cx="120" cy="390" r="16" fill="#08050D"/>
  <circle cx="392" cy="390" r="16" fill="#08050D"/>

  <g filter="url(#glow)">
    <polygon points="256,215 308,245 308,305 256,335 204,305 204,245" 
             fill="none" 
             stroke="url(#coreGrad)" 
             stroke-width="14" 
             stroke-linejoin="round"/>
             
    <circle cx="256" cy="275" r="14" fill="#22D3EE"/>
    
    <line x1="256" y1="275" x2="256" y2="215" stroke="#22D3EE" stroke-width="8" stroke-linecap="round"/>
    <line x1="256" y1="275" x2="308" y2="305" stroke="#22D3EE" stroke-width="8" stroke-linecap="round"/>
    <line x1="256" y1="275" x2="204" y2="305" stroke="#22D3EE" stroke-width="8" stroke-linecap="round"/>
  </g>

  <circle cx="90" cy="190" r="8" fill="#F43F5E" filter="url(#glow)"/>
  <circle cx="430" cy="340" r="12" fill="#F59E0B" filter="url(#glow)"/>
  <circle cx="370" cy="140" r="6" fill="#22D3EE" filter="url(#glow)"/>
</svg>
